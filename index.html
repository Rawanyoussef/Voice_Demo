<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>سيتي ستارز — المساعد الذكي</title>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<div class="app-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🏬</div>
      <div class="brand-text">
        <div class="brand-name">سيتي ستارز</div>
        <div class="brand-sub">AI Wayfinding Demo</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn end-btn" id="endBtn" onclick="confirmEndChat()" title="إنهاء المحادثة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>
        </svg>
        إنهاء
      </button>
      <div class="header-btn gear-btn" id="gearBtn" onclick="toggleDrawer()">
        <div class="key-dot"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- SETTINGS DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-inner">
      <div class="drawer-head">الإعدادات</div>
      <div class="field-group">

        <div class="field">
          <div class="field-label">
            🔑 OpenAI API Key
            <span class="tag tag-gpt">GPT-5 mini</span>
          </div>
          <div class="input-row">
            <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off"/>
            <button class="save-btn" onclick="saveKey('openai')">حفظ</button>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            🎤 ElevenLabs API Key
            <span class="tag tag-el">صوت مصري</span>
          </div>
          <div class="input-row">
            <input type="password" id="elevenKey" placeholder="..." autocomplete="off"/>
            <button class="save-btn gold" onclick="saveKey('eleven')">حفظ</button>
          </div>
        </div>

        <div class="field">
          <div class="field-label">🎭 اختار الصوت</div>
          <div class="voice-toggle">
            <button class="voice-btn" id="btnFemale" onclick="selectVoice('female')">👩 ستاتي</button>
            <button class="voice-btn" id="btnMale"   onclick="selectVoice('male')">👨 رجالي</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- STATUS -->
    <div class="status-pill" id="statusPill">
      <div class="pill-dot"></div>
      <span id="statusTxt">قول عايز تروح فين</span>
    </div>

    <!-- CHAT HISTORY (persistent) -->
    <div class="chat-history" id="chatHistory"></div>

    <!-- ORB -->
    <div class="orb-area">
      <div class="orb-wrapper">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb" id="orb" onclick="toggleRecord()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </div>
      <div class="silence-bar" id="silBar"><div class="silence-fill" id="silFill"></div></div>
      <div class="wave" id="wave">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- LIVE CARDS -->
    <div class="cards">
      <div class="card" id="cardUser">
        <div class="card-tag you">🗣 سمعت</div>
        <div class="card-body" id="cardUserTxt"></div>
      </div>
      <div class="card" id="cardAi">
        <div class="card-tag ai">🤖 الرد</div>
        <div class="card-body" id="cardAiTxt"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- HINT CHIPS -->
    <div class="hints-section">
      <div class="hints-label">جرب تقول</div>
      <div class="hints-grid" id="hintsGrid"></div>
    </div>

    <div class="page-hint">اضغط الدائرة أو <kbd>Space</kbd> للتسجيل</div>

  </div><!-- /main-content -->
</div><!-- /app-wrapper -->

<!-- CONFIRM END DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">💬</div>
    <div class="confirm-title">إنهاء المحادثة؟</div>
    <div class="confirm-desc">هيتم مسح الـ Chat history الحالي. تقدر تبدأ محادثة جديدة بعدها.</div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeConfirm()">لأ، رجّعني</button>
      <button class="confirm-btn confirm-end" onclick="endChat()">آه، خلّص</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/app.js"></script>
</body>
</html>
